"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](#ADC5F7)\
[ у°ЈҮ ](bg:#ADC5F7 fg:#ffffff)\
[оӮҙ](bg:#B1E0D9 fg:#ADC5F7)\
$directory\
[оӮҙ](fg:#B1E0D9 bg:#C1E4B7)\
$git_branch\
$git_status\
[оӮҙ](fg:#C1E4B7 bg:#F8C2A8)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#F8C2A8 bg:#F6D0EC)\
$time\
[оӮҙ ](fg:#F6D0EC)\
\n$character"""

[directory]
style = "fg:#0F1115 bg:#B1E0D9"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"~" = "уұӮө"

[git_branch]
symbol = "пҗҳ"
style = "bg:#C1E4B7"
format = '[[ $symbol $branch ](fg:#0F1115 bg:#C1E4B7)]($style)'

[git_status]
style = "bg:#C1E4B7"
format = '[[($all_status$ahead_behind )](fg:#0F1115 bg:#C1E4B7)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#F8C2A8"
format = '[[ $symbol ($version) ](fg:#0F1115 bg:#F8C2A8)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#F8C2A8"
format = '[[ $symbol ($version) ](fg:#0F1115 bg:#F8C2A8)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#F8C2A8"
format = '[[ $symbol ($version) ](fg:#0F1115 bg:#F8C2A8)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#F8C2A8"
format = '[[ $symbol ($version) ](fg:#0F1115 bg:#F8C2A8)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#F6D0EC"
format = '[[ пҗә $time ](fg:#0F1115 bg:#F6D0EC)]($style)'
